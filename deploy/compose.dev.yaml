# Local dev: database only by default. The Astro dev loop stays on the host
# (pnpm astro dev); run the api on the host too (pnpm dev in api/) with
# DATABASE_URL=postgresql://portfolio:portfolio@localhost:5433/portfolio
# (host port 5433 because 5432 is occupied by a local Postgres on Tal's
# machine)
services:
  db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio # dev-only credentials
      POSTGRES_DB: portfolio
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      # postgres:18+ images store data under /var/lib/postgresql (not .../data)
      - pgdata-dev:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portfolio']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata-dev:
